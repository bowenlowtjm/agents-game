name: CI (tests)

# Light per-push gate, full gate on PRs to main.
#
# IMPORTANT: CI is the PRE-MERGE gate, not the agent's inner loop. The agent must
# compile-check LOCALLY on every edit via `scripts/unity-check.sh` (seconds, no
# Docker image pull). Do NOT wait on CI per edit — that's minutes of image-pull +
# asset import. CI just confirms green before merge.
#
# Cost shape:
#   - feature/** push -> EditMode (unit) only       (fast)
#   - PR to main      -> EditMode + PlayMode         (full)
#   - Android APK build is main-only (see build.yml) — never on feature pushes.
#
# Requires Unity license secrets: UNITY_LICENSE, UNITY_EMAIL, UNITY_PASSWORD.

on:
  push:
    branches: ['feature/**']
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true   # superseded pushes auto-cancel

jobs:
  # Fast gate on every feature push: EditMode unit tests only (they compile the
  # code too). No PlayMode, no platform build, no Android NDK image.
  editmode:
    name: EditMode tests (fast gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-test-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-test-
            Library-
      - name: EditMode
        uses: game-ci/unity-test-runner@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          testMode: editmode
          artifactsPath: editmode-results
          githubToken: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: editmode-results
          path: editmode-results

  # Full gate only on PR to main (and manual dispatch): adds the slower PlayMode
  # pass. Keeps the per-feature-push loop cheap.
  playmode:
    name: PlayMode tests (full gate)
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-test-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-test-
            Library-
      - name: PlayMode
        uses: game-ci/unity-test-runner@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          testMode: playmode
          artifactsPath: playmode-results
          githubToken: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playmode-results
          path: playmode-results
